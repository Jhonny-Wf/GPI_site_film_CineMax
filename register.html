<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Înregistrare - Cinema</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e50914'/><text x='50%' y='50%' font-family='Arial' font-size='50' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'>CM</text></svg>">
</head>
<body>
    <header>
        <a href="index.html" style="text-decoration:none;"><h1><span style="color: #fff;">Cine</span><span style="color: #e50914;">Max</span></h1></a>
        <div class="header-right">
            <div class="search-wrapper">
                <input type="text" id="globalSearch" placeholder="Căutare...">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
            <a href="about.html">Despre</a> | 
            <a href="contact.html">Contact</a> | 
            <a href="login.html">Login</a> | <a href="register.html">Signup</a>
        </div>
    </header>
    <div class="container" style="max-width: 450px;">
        <div class="page-content">
            <h2 style="text-align: center; border-bottom: none;">Creare Cont Nou</h2>
            <p style="color:#aaa; text-align: center; margin-bottom: 25px;">Înregistrează-te gratuit și alătură-te comunității CineMax.</p>
            
            <form method="POST" action="login.html" class="contact-form">
                <label for="reg-username">Username dorit:</label>
                <input type="text" id="reg-username" name="username" placeholder="Alege un username unic" required>

                <label for="reg-email">Adresă de Email:</label>
                <input type="email" id="reg-email" name="email" placeholder="adresata@exemplu.ro" required>

                <label for="reg-password">Parola:</label>
                <input type="password" id="reg-password" name="password" placeholder="••••••••" required>

                <button type="submit" class="btn" style="margin-top: 15px; width: 100%;">Înregistrează-te</button>
                
                <p style="text-align: center; margin-top: 20px; color: #fff;">Ai deja cont? <a href="login.html" style="color: #e50914; text-decoration: none; font-weight: bold;">Autentificare</a></p>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 CineMax Portal. Toate drepturile rezervate.</p>
        <p>Proiect educațional demonstrativ.</p>
        <div class="footer-links">
            <a href="about.html">Despre</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </div>
    </footer>

    <script>
        document.getElementById('globalSearch')?.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                window.location.href = 'index.html?search=' + encodeURIComponent(this.value);
            }
        });
    </script>
    <script src="auth.js"></script>
</body>
</html>
